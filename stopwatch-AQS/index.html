<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Timer and Countdown</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="text-center p-4">

  <!-- Main Menu -->
  <div id="main-page">
    <h1 class="mb-4">Timer and Countdown</h1>
    <button class="btn btn-primary btn-lg m-3" onclick="showPage('stopwatch-page')">Stopwatch</button>
    <button class="btn btn-secondary btn-lg m-3" onclick="showPage('countdown-page')">Countdown</button>
  </div>

  <!-- Stopwatch Page -->
  <div id="stopwatch-page" class="d-none">
    <div class="mb-3">
      <div class="border border-dark rounded p-3 bg-light" style="font-size: 5rem;">
        <span id="stopwatch-display">00:00:00</span><span style="font-size: 1.5rem;">000</span>
      </div>
    </div>
    <div>
      <button class="btn btn-success btn-lg m-2" onclick="toggleStopwatch()">Start</button>
      <button class="btn btn-danger btn-lg m-2" onclick="resetStopwatch()">Clear</button>
    </div>
    <button class="btn btn-link mt-4" onclick="showPage('main-page')">← Back</button>
  </div>

  <!-- Countdown Page -->
  <div id="countdown-page" class="d-none">
    <div class="mb-3">
      <div class="border border-dark rounded p-3 bg-light" style="font-size: 5rem;">
        <span id="countdown-display">00:00:00</span>
      </div>
    </div>
    <div id="countdown-buttons" class="d-flex justify-content-center flex-wrap mb-3">
      <!-- Digit buttons will be dynamically created by JS -->
    </div>
    <div>
      <button class="btn btn-success btn-lg m-2" onclick="startCountdown()">Start</button>
      <button class="btn btn-warning btn-lg m-2" onclick="pauseCountdown()">Pause</button>
      <button class="btn btn-danger btn-lg m-2" onclick="clearCountdown()">Clear</button>
    </div>
    <div id="countdown-alert" class="text-danger fw-bold mt-3" style="display: none;">Time's up!</div>
    <button class="btn btn-link mt-4" onclick="showPage('main-page')">← Back</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
